services:
  - type: web
    name: strive-api
    env: node
    region: ohio
    rootDir: packages/server
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: TELEGRAM_BOT_TOKEN
        value: 8713067780:AAElc8eGFqVtKqlL6TlYFQqfsQ66vdN_MIs
      - key: ADMIN_EMAIL
        value: admin@strive.com
      - key: ADMIN_PASSWORD
        value: admin123

  - type: web
    name: strive-web
    env: node
    region: ohio
    rootDir: packages/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: strive-api
          type: web
          property: host
      - key: PORT
        value: "3000"
